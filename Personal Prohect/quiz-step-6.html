<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="immagini/icon-180.png">
<link rel="icon" type="image/png" href="immagini/icon-180.png">
<meta name="apple-mobile-web-app-title" content="Nite">
<title>Trova la serata — 6</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  :root{--neutral-900:#100d12;--primary-600:#c22b00;--primary-700:#942000;--brand-sec:#7a3000;--brand-sec-h:#c24c00;--brand-sec-p:#943a00;--text-primary:#f7f6f8;--text-sec:#edeced;--attention:#e8b432;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{background:#0a080c;}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a080c;font-family:'Plus Jakarta Sans',sans-serif;}
  .phone{width:390px;height:844px;background:var(--neutral-900);border-radius:44px;overflow:hidden;display:flex;flex-direction:column;padding:0 24px;box-shadow:0 0 0 10px #1a1a1a,0 32px 80px rgba(0,0,0,.8);}
  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:21px 0 19px}
  .status-bar__time{font-family:system-ui,sans-serif;font-size:17px;font-weight:590;color:#fff;letter-spacing:-.3px;width:100px}
  .status-bar__icons{display:flex;align-items:center;gap:6px;justify-content:flex-end;width:100px}
  .status-bar__icons i{color:#fff}
  .icon-cellular,.icon-wifi{font-size:14px} .icon-battery{font-size:18px}
  .top-nav{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
  .btn-back{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .btn-back:hover{background:rgba(255,255,255,.12)}
  .btn-back:focus-visible{outline:2px solid rgba(255,255,255,.7);outline-offset:2px;}
  .btn-back i{font-size:18px;color:rgba(255,255,255,.7)}
  .step-label{font-size:12px;font-weight:500;color:rgba(255,255,255,.65)}
  .step-label span{color:var(--brand-sec-h);font-weight:600}
  .progress-segs{display:flex;gap:4px;margin-top:14px}
  .seg{flex:1;height:3px;border-radius:99px;background:rgba(255,255,255,.10)}
  .seg.done{background:var(--primary-600)}
  .seg.active{background:linear-gradient(to right,var(--primary-600) 60%,rgba(255,255,255,.10) 60%)}
  .scroll-area{flex:1;overflow-y:auto;scrollbar-width:none;padding-bottom:8px}
  .scroll-area::-webkit-scrollbar{display:none}
  .page-header{margin-top:28px}
  .page-eyebrow{font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--attention);text-transform:uppercase;margin-bottom:10px}
  .page-title{font-family:'DM Serif Display',serif;font-size:26px;line-height:33px;color:var(--text-primary)}
  .page-sub{margin-top:8px;font-size:13px;line-height:19px;color:rgba(255,255,255,.65)}

  /* Big tap cards — 2-column grid */
  .group-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:28px}
  .group-card{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:24px 16px;border-radius:24px;background:#322f35;border:1px solid #413e44;cursor:pointer;user-select:none;transition:background .18s,border-color .18s,transform .1s;text-align:center}
  .group-card:active{transform:scale(.96);background:#282530}
  .group-card__icon{width:52px;height:52px;border-radius:16px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;transition:background .18s}
  .group-card__icon i{font-size:26px;color:rgba(255,255,255,.55);transition:color .18s}
  .group-card__label{font-size:14px;font-weight:600;color:rgba(255,255,255,.65);transition:color .18s;line-height:1.3}
  .group-card__sub{font-size:11px;color:rgba(255,255,255,.55);transition:color .18s;margin-top:2px}
  .group-card:focus-visible{outline:2px solid rgba(255,255,255,.7);outline-offset:2px;}
  .group-card.selected{background:rgba(194,76,0,.18);border-color:#c24c00}
  .group-card.selected .group-card__icon{background:rgba(194,76,0,.18)}
  .group-card.selected .group-card__icon i{color:#e05500}
  .group-card.selected .group-card__label{color:#fff}
  .group-card.selected .group-card__sub{color:rgba(255,255,255,.60)}

  /* Full-width option for "non importa" */
  .group-card.full{grid-column:1/-1;flex-direction:row;justify-content:flex-start;padding:16px 20px;gap:14px}
  .group-card.full .group-card__texts{display:flex;flex-direction:column;align-items:flex-start;text-align:left}

  .footer{position:sticky;bottom:0;background:var(--neutral-900);padding:20px 0 32px}
  .btn-continue{width:100%;height:52px;border-radius:40px;background:#c24c00;border:1px solid #943a00;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:500;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,border-color .15s,transform .1s}
  .btn-continue:hover{background:#c44e00;border-color:#b53700}
  .btn-continue:active{background:#943a00;border-color:#6b1800;transform:scale(.98)}
  .btn-continue:focus-visible{outline:2px solid rgba(255,255,255,.7);outline-offset:2px;}
  .btn-continue:disabled{background:rgba(255,255,255,.07);border-color:transparent;color:#9c9a9f;cursor:not-allowed;transform:none}

@media (max-width: 430px) {
  html, body { background: #0f0d12; }
  body { align-items: flex-start; }
  .phone {
    width: 100%;
    height: calc(100svh + env(safe-area-inset-top));
    border-radius: 0;
    box-shadow: none;
    padding-bottom: env(safe-area-inset-bottom);
    padding-top: env(safe-area-inset-top);
  }
  .status-bar { display: none; }
  /* fade above nav bar */
  .nav-wrap { position: relative; }
  .nav-wrap::before {
    content: '';
    position: absolute;
    top: -52px; left: 0; right: 0; height: 52px;
    background: linear-gradient(to bottom, transparent, #100d12);
    pointer-events: none;
    z-index: 4;
  }
}
@media (max-width: 430px){ .footer{ padding-bottom: 8px; } }
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <i class="ph-fill ph-cell-signal-full icon-cellular" aria-hidden="true"></i>
      <i class="ph-fill ph-wifi-high icon-wifi" aria-hidden="true"></i>
      <i class="ph-fill ph-battery-full icon-battery" aria-hidden="true"></i>
    </div>
  </div>
  <div class="top-nav">
    <button class="btn-back" onclick="history.back()" aria-label="Torna indietro"><i class="ph ph-arrow-left" aria-hidden="true"></i></button>
    <button class="btn-back" onclick="window.location.href='event-card.html'" aria-label="Chiudi quiz"><i class="ph ph-x" aria-hidden="true"></i></button>
  </div>
  <div class="progress-segs">
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg active"></div>
    <div class="seg"></div>
  </div>
  <div class="scroll-area">
    <div class="page-header">
      <p class="page-eyebrow">Compagnia</p>
      <h1 class="page-title">Sei da solo o in gruppo?</h1>
      <p class="page-sub">Così troviamo l'evento più adatto alla tua serata.</p>
    </div>
    <div class="group-grid">
      <div class="group-card" role="button" tabindex="0" onclick="selectGroup(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
        <div class="group-card__icon"><i class="ph ph-person" aria-hidden="true"></i></div>
        <div class="group-card__label">Solo</div>
        <div class="group-card__sub">Solo io</div>
      </div>
      <div class="group-card" role="button" tabindex="0" onclick="selectGroup(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
        <div class="group-card__icon"><i class="ph ph-users" aria-hidden="true"></i></div>
        <div class="group-card__label">In coppia</div>
        <div class="group-card__sub">2 persone</div>
      </div>
      <div class="group-card" role="button" tabindex="0" onclick="selectGroup(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
        <div class="group-card__icon"><i class="ph ph-user-circle-plus" aria-hidden="true"></i></div>
        <div class="group-card__label">Piccolo gruppo</div>
        <div class="group-card__sub">3 – 5 persone</div>
      </div>
      <div class="group-card" role="button" tabindex="0" onclick="selectGroup(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
        <div class="group-card__icon"><i class="ph ph-users-three" aria-hidden="true"></i></div>
        <div class="group-card__label">Grande gruppo</div>
        <div class="group-card__sub">6 o più</div>
      </div>
    </div>
    <div class="footer">
      <button class="btn-continue" id="btnContinue" disabled onclick="window.location.href='quiz-step-7.html'">
        Continua <i class="ph ph-arrow-right" aria-hidden="true"></i>
      </button>
    </div>
  </div>
</div>
<script>
function selectGroup(card) {
  document.querySelectorAll('.group-card').forEach(c => c.classList.remove('selected'));
  card.classList.add('selected');
  document.getElementById('btnContinue').disabled = false;
}
</script>
</body>
</html>
