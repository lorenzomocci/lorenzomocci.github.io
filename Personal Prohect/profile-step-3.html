<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="immagini/icon-180.png">
<link rel="icon" type="image/png" href="immagini/icon-180.png">
<meta name="apple-mobile-web-app-title" content="Nite">
<title>Profilo — Generi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  :root {
    --neutral-900: #100d12;
    --primary-600: #c22b00;
    --primary-700: #942000;
    --brand-sec:   #7a3000;
    --brand-sec-h: #c24c00;
    --brand-sec-p: #943a00;
    --border:      #231f26;
    --text-primary:#f7f6f8;
    --text-sec:    #edeced;
    --text-tertiary:#c4c2c7;
    --attention:   #e8b432;
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  html { background: #0a080c; }

  body {
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0a080c;font-family:'Plus Jakarta Sans',sans-serif;
  }

  .phone {
    width:390px;height:844px;background:var(--neutral-900);
    border-radius:44px;overflow:hidden;display:flex;flex-direction:column;
    padding:0 24px 0;
    box-shadow:0 0 0 10px #1a1a1a, 0 32px 80px rgba(0,0,0,.8);
  }

  /* ── Status bar ── */
  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:21px 0 19px}
  .status-bar__time{font-family:system-ui,-apple-system,sans-serif;font-size:17px;font-weight:590;color:#fff;letter-spacing:-.3px;width:100px}
  .status-bar__icons{display:flex;align-items:center;gap:6px;justify-content:flex-end;width:100px}
  .status-bar__icons i{color:#fff;line-height:1}
  .icon-cellular{font-size:14px}.icon-wifi{font-size:14px}.icon-battery{font-size:18px}

  /* ── Top nav ── */
  .top-nav{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
  .btn-back{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s}
  .btn-back:hover{background:rgba(255,255,255,.12)}
  .btn-back:focus-visible{outline:2px solid rgba(255,255,255,.7);outline-offset:2px;}
  .btn-back i{font-size:18px;color:rgba(255,255,255,.7)}
  .step-label{font-size:12px;font-weight:500;color:rgba(255,255,255,.65)}
  .step-label span{color:var(--brand-sec-h);font-weight:600}

  /* ── Progress ── */
  .progress-segs{display:flex;gap:4px;margin-top:14px}
  .seg{flex:1;height:3px;border-radius:99px;background:rgba(255,255,255,.10)}
  .seg.done{background:var(--primary-600)}
  .seg.active{background:linear-gradient(to right,var(--primary-600) 60%,rgba(255,255,255,.10) 60%)}

  /* ── Heading ── */
  .page-header{margin-top:28px}
  .page-eyebrow{font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--attention);text-transform:uppercase;margin-bottom:10px}
  .page-title{font-family:'DM Serif Display',serif;font-size:26px;line-height:33px;color:var(--text-primary)}
  .page-sub{margin-top:8px;font-size:13px;line-height:19px;color:rgba(255,255,255,.65)}

  /* ── Genre chips ── */
  .chips-grid{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:28px;
  }

  .genre-chip{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:11px 16px;
    border-radius:24px;
    background:#322f35;
    border:1px solid #413e44;
    cursor:pointer;
    user-select:none;
    transition:background .18s, border-color .18s, transform .1s;
  }
  .genre-chip:active{transform:scale(.95)}

  .genre-chip i{
    font-size:17px;
    color:rgba(255,255,255,.65);
    transition:color .18s;
    flex-shrink:0;
  }
  .genre-chip__label{
    font-size:13px;
    font-weight:500;
    color:rgba(255,255,255,.70);
    transition:color .18s;
    white-space:nowrap;
  }
  .genre-chip:focus-visible{outline:2px solid rgba(255,255,255,.7);outline-offset:2px;}

  .genre-chip.selected{
    background:rgba(194,76,0,.18);
    border-color:#c24c00;
  }
  .genre-chip.selected i{color:#c24c00}
  .genre-chip.selected .genre-chip__label{color:#c24c00}

  /* ── Hint ── */
  .hint{
    margin-top:16px;
    font-size:11px;
    color:rgba(255,255,255,.55);
    text-align:center;
  }

  /* ── Footer ── */
  .footer{margin-top:auto;padding:20px 0 32px}
  .btn-continue{
    width:100%;height:52px;border-radius:40px;
    background:#c24c00;border:1px solid #943a00;cursor:pointer;
    font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:500;
    color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;
    transition:background .15s,border-color .15s,transform .1s;
  }
  .btn-continue i{font-size:18px}
  .btn-continue:hover{background:#c44e00;border-color:#b53700}
  .btn-continue:active{background:#943a00;border-color:#6b1800;transform:scale(.98)}
  .btn-continue:focus-visible{outline:2px solid rgba(255,255,255,.7);outline-offset:2px;}
  .btn-continue:disabled{background:rgba(255,255,255,.07);border-color:transparent;color:#9c9a9f;cursor:not-allowed;transform:none}
  /* ── Scroll area ── */
  .phone { overflow: hidden; }
  .scroll-area { flex:1; overflow-y:auto; scrollbar-width:none; padding-bottom:8px; }
  .scroll-area::-webkit-scrollbar { display:none; }
  .footer { position:sticky; bottom:0; background:var(--neutral-900); }

@media (max-width: 430px) {
  html, body { background: #0f0d12; }
  body { align-items: flex-start; }
  .phone {
    width: 100%;
    height: calc(100svh + env(safe-area-inset-top));
    border-radius: 0;
    box-shadow: none;
    padding-bottom: env(safe-area-inset-bottom);
    padding-top: env(safe-area-inset-top);
  }
  .status-bar { display: none; }
  /* fade above nav bar */
  .nav-wrap { position: relative; }
  .nav-wrap::before {
    content: '';
    position: absolute;
    top: -52px; left: 0; right: 0; height: 52px;
    background: linear-gradient(to bottom, transparent, #100d12);
    pointer-events: none;
    z-index: 4;
  }
}
@media (max-width: 430px){ .footer{ padding-bottom: 8px; } }
</style>
</head>
<body>
<div class="phone">

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <i class="ph-fill ph-cell-signal-full icon-cellular" aria-hidden="true"></i>
      <i class="ph-fill ph-wifi-high icon-wifi" aria-hidden="true"></i>
      <i class="ph-fill ph-battery-full icon-battery" aria-hidden="true"></i>
    </div>
  </div>

  <!-- Top nav -->
  <div class="top-nav">
    <button class="btn-back" onclick="history.back()" aria-label="Torna indietro"><i class="ph ph-arrow-left" aria-hidden="true"></i></button>
    <span class="step-label">Step <span>5</span> of 6</span>
  </div>

  <!-- Progress -->
  <div class="progress-segs">
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg active"></div>
    <div class="seg"></div>
  </div>

  <div class="scroll-area">
  <!-- Heading -->
  <div class="page-header">
    <p class="page-eyebrow">I tuoi gusti</p>
    <h1 class="page-title">Che generi ti fanno muovere?</h1>
    <p class="page-sub">Scegli i generi che ami — ti mostreremo eventi su misura.</p>
  </div>

  <!-- Genre chips -->
  <div class="chips-grid">

    <div class="genre-chip" role="button" tabindex="0" onclick="toggle(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
      <i class="ph ph-star" aria-hidden="true"></i>
      <span class="genre-chip__label">Pop</span>
    </div>

    <div class="genre-chip" role="button" tabindex="0" onclick="toggle(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
      <i class="ph ph-microphone" aria-hidden="true"></i>
      <span class="genre-chip__label">Rap</span>
    </div>

    <div class="genre-chip" role="button" tabindex="0" onclick="toggle(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
      <i class="ph ph-heart" aria-hidden="true"></i>
      <span class="genre-chip__label">R&B</span>
    </div>

    <div class="genre-chip" role="button" tabindex="0" onclick="toggle(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
      <i class="ph ph-speaker-high" aria-hidden="true"></i>
      <span class="genre-chip__label">House</span>
    </div>

    <div class="genre-chip" role="button" tabindex="0" onclick="toggle(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
      <i class="ph ph-pulse" aria-hidden="true"></i>
      <span class="genre-chip__label">Techno</span>
    </div>

    <div class="genre-chip" role="button" tabindex="0" onclick="toggle(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
      <i class="ph ph-guitar" aria-hidden="true"></i>
      <span class="genre-chip__label">Indie</span>
    </div>

    <div class="genre-chip" role="button" tabindex="0" onclick="toggle(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
      <i class="ph ph-lightning" aria-hidden="true"></i>
      <span class="genre-chip__label">Rock</span>
    </div>

    <div class="genre-chip" role="button" tabindex="0" onclick="toggle(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
      <i class="ph ph-fire" aria-hidden="true"></i>
      <span class="genre-chip__label">Latin</span>
    </div>

    <div class="genre-chip" role="button" tabindex="0" onclick="toggle(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
      <i class="ph ph-moon" aria-hidden="true"></i>
      <span class="genre-chip__label">Chill</span>
    </div>

    <div class="genre-chip" role="button" tabindex="0" onclick="toggle(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
      <i class="ph ph-microphone-stage" aria-hidden="true"></i>
      <span class="genre-chip__label">Live</span>
    </div>

  </div>

  <p class="hint" id="hint">Seleziona almeno un genere</p>
  </div><!-- /scroll-area -->

  <!-- Footer -->
  <div class="footer">
    <button class="btn-continue" id="btnContinue" disabled onclick="window.location.href='profile-step-4.html'">
      Continua <i class="ph ph-arrow-right" aria-hidden="true"></i>
    </button>
  </div>

</div>

<script>
function toggle(chip) {
  chip.classList.toggle('selected');

  const icon = chip.querySelector('i');
  const base = icon.className.replace('ph-fill ', '').replace('ph ', '').trim();
  icon.className = chip.classList.contains('selected') ? 'ph-fill ' + base : 'ph ' + base;

  const count = document.querySelectorAll('.genre-chip.selected').length;
  document.getElementById('btnContinue').disabled = count === 0;
  document.getElementById('hint').style.opacity = count > 0 ? '0' : '1';
}
</script>
</body>
</html>
