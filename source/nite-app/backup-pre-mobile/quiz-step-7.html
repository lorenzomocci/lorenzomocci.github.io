<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trova la serata — 7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  :root{--neutral-900:#100d12;--primary-600:#c22b00;--primary-700:#942000;--brand-sec:#7a3000;--brand-sec-h:#c24c00;--brand-sec-p:#943a00;--text-primary:#f7f6f8;--text-sec:#edeced;--attention:#e8b432;}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{background:#0a080c;}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a080c;font-family:'Plus Jakarta Sans',sans-serif;}
  .phone{width:390px;height:844px;background:var(--neutral-900);border-radius:44px;overflow:hidden;display:flex;flex-direction:column;padding:0 24px;box-shadow:0 0 0 10px #1a1a1a,0 32px 80px rgba(0,0,0,.8);}
  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:21px 0 19px}
  .status-bar__time{font-family:system-ui,sans-serif;font-size:17px;font-weight:590;color:#fff;letter-spacing:-.3px;width:100px}
  .status-bar__icons{display:flex;align-items:center;gap:6px;justify-content:flex-end;width:100px}
  .status-bar__icons i{color:#fff}
  .icon-cellular,.icon-wifi{font-size:14px} .icon-battery{font-size:18px}
  .top-nav{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
  .btn-back{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .btn-back:hover{background:rgba(255,255,255,.12)}
  .btn-back:focus-visible{outline:2px solid rgba(255,255,255,.7);outline-offset:2px;}
  .btn-back i{font-size:18px;color:rgba(255,255,255,.7)}
  .step-label{font-size:12px;font-weight:500;color:rgba(255,255,255,.65)}
  .step-label span{color:var(--attention);font-weight:600}
  .progress-segs{display:flex;gap:4px;margin-top:14px}
  .seg{flex:1;height:3px;border-radius:99px;background:rgba(255,255,255,.10)}
  .seg.done{background:var(--primary-600)}
  .seg.active{background:linear-gradient(to right,var(--primary-600) 60%,rgba(255,255,255,.10) 60%)}
  .scroll-area{flex:1;overflow-y:auto;scrollbar-width:none;padding-bottom:8px}
  .scroll-area::-webkit-scrollbar{display:none}
  .page-header{margin-top:28px}
  .page-eyebrow{font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--attention);text-transform:uppercase;margin-bottom:10px}
  .page-title{font-family:'DM Serif Display',serif;font-size:26px;line-height:33px;color:var(--text-primary)}
  .page-sub{margin-top:8px;font-size:13px;line-height:19px;color:rgba(255,255,255,.65)}
  .options-list{display:flex;flex-direction:column;gap:10px;margin-top:28px}
  .option-row{display:flex;align-items:center;gap:14px;padding:16px;border-radius:24px;background:#322f35;border:1px solid #413e44;cursor:pointer;user-select:none;transition:background .18s,border-color .18s,transform .1s}
  .option-row:active{transform:scale(.985);background:#282530}
  .option-icon{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .18s}
  .option-icon i{font-size:20px;color:rgba(255,255,255,.60);transition:color .18s}
  .option-text{flex:1}
  .option-label{font-size:15px;font-weight:500;color:rgba(255,255,255,.65);transition:color .18s}
  .option-sub{font-size:12px;color:rgba(255,255,255,.55);margin-top:2px;transition:color .18s}
  .option-row:focus-visible{outline:2px solid rgba(255,255,255,.7);outline-offset:2px;}
  .option-radio{width:20px;height:20px;border-radius:50%;border:2px solid rgba(255,255,255,.12);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:border-color .18s}
  .option-radio::after{content:'';width:8px;height:8px;border-radius:50%;background:var(--primary-700);transform:scale(0);transition:transform .18s cubic-bezier(.34,1.56,.64,1)}
  .option-row.selected{background:rgba(194,76,0,.18);border-color:#c24c00}
  .option-row.selected .option-icon{background:rgba(194,76,0,.18)}
  .option-row.selected .option-icon i{color:#e05500}
  .option-row.selected .option-label{color:#fff;font-weight:600}
  .option-row.selected .option-sub{color:rgba(255,255,255,.60)}
  .option-row.selected .option-radio{border-color:#c24c00}
  .option-row.selected .option-radio::after{transform:scale(1)}

  /* Finish button — slightly different CTA */
  .footer{position:sticky;bottom:0;background:var(--neutral-900);padding:20px 0 32px}
  .btn-finish{width:100%;height:52px;border-radius:40px;background:#c24c00;border:1px solid #943a00;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:600;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s,transform .1s,box-shadow .15s}
  .btn-finish:hover{background:#d45500;box-shadow:0 0 32px rgba(194,76,0,.35)}
  .btn-finish:active{background:#943a00;border-color:#6b1800;transform:scale(.98)}
  .btn-finish:focus-visible{outline:2px solid rgba(255,255,255,.7);outline-offset:2px;}
  .btn-finish:disabled{background:rgba(255,255,255,.07);border-color:transparent;color:#9c9a9f;cursor:not-allowed;transform:none;box-shadow:none}
  .btn-finish i{font-size:18px}
</style>
</head>
<body>
<div class="phone">
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <i class="ph-fill ph-cell-signal-full icon-cellular" aria-hidden="true"></i>
      <i class="ph-fill ph-wifi-high icon-wifi" aria-hidden="true"></i>
      <i class="ph-fill ph-battery-full icon-battery" aria-hidden="true"></i>
    </div>
  </div>
  <div class="top-nav">
    <button class="btn-back" onclick="history.back()" aria-label="Torna indietro"><i class="ph ph-arrow-left" aria-hidden="true"></i></button>
    <button class="btn-back" onclick="window.location.href='event-card.html'" aria-label="Chiudi quiz"><i class="ph ph-x" aria-hidden="true"></i></button>
  </div>
  <div class="progress-segs">
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg active"></div>
  </div>
  <div class="scroll-area">
    <div class="page-header">
      <p class="page-eyebrow">Ultimo step</p>
      <h1 class="page-title">Quanta gente vuoi trovare?</h1>
      <p class="page-sub">Filtriamo gli eventi in base all'atmosfera che preferisci.</p>
    </div>
    <div class="options-list">
      <div class="option-row" role="button" tabindex="0" onclick="selectOption(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
        <div class="option-icon"><i class="ph ph-house" aria-hidden="true"></i></div>
        <div class="option-text">
          <div class="option-label">Locale intimo</div>
          <div class="option-sub">Poca gente, atmosfera raccolta</div>
        </div>
        <div class="option-radio"></div>
      </div>
      <div class="option-row" role="button" tabindex="0" onclick="selectOption(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
        <div class="option-icon"><i class="ph ph-buildings" aria-hidden="true"></i></div>
        <div class="option-text">
          <div class="option-label">Evento medio</div>
          <div class="option-sub">Né troppo vuoto né troppo caotico</div>
        </div>
        <div class="option-radio"></div>
      </div>
      <div class="option-row" role="button" tabindex="0" onclick="selectOption(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
        <div class="option-icon"><i class="ph ph-stadium" aria-hidden="true"></i></div>
        <div class="option-text">
          <div class="option-label">Grande evento</div>
          <div class="option-sub">Tanta energia, molto affollato</div>
        </div>
        <div class="option-radio"></div>
      </div>
      <div class="option-row" role="button" tabindex="0" onclick="selectOption(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
        <div class="option-icon"><i class="ph ph-check-circle" aria-hidden="true"></i></div>
        <div class="option-text">
          <div class="option-label">Non mi importa</div>
          <div class="option-sub">Mostrami tutto quello che c'è</div>
        </div>
        <div class="option-radio"></div>
      </div>
    </div>
    <div class="footer">
      <button class="btn-finish" id="btnFinish" disabled onclick="window.location.href='events-browse.html'">
        Mostrami le serate <i class="ph ph-sparkle" aria-hidden="true"></i>
      </button>
    </div>
  </div>
</div>
<script>
function selectOption(row) {
  document.querySelectorAll('.option-row').forEach(r => r.classList.remove('selected'));
  row.classList.add('selected');
  document.getElementById('btnFinish').disabled = false;
}
</script>
</body>
</html>
