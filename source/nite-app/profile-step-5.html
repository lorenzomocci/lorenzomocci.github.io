<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="immagini/icon-180.png">
<link rel="icon" type="image/png" href="immagini/icon-180.png">
<meta name="apple-mobile-web-app-title" content="Nite">
<title>Profilo — Budget</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  :root {
    --neutral-900: #100d12;
    --primary-600: #c22b00;
    --primary-700: #942000;
    --brand-sec:   #7a3000;
    --brand-sec-h: #c24c00;
    --brand-sec-p: #943a00;
    --border:      #231f26;
    --text-primary:#f7f6f8;
    --text-sec:    #edeced;
    --attention:   #e8b432;
  }

  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  html { background: #0a080c; }

  body {
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0a080c;font-family:'Plus Jakarta Sans',sans-serif;
  }

  .phone {
    width:390px;height:844px;background:var(--neutral-900);
    border-radius:44px;overflow:hidden;display:flex;flex-direction:column;
    padding:0 24px 0;
    box-shadow:0 0 0 10px #1a1a1a, 0 32px 80px rgba(0,0,0,.8);
  }

  /* ── Status bar ── */
  .status-bar{display:flex;justify-content:space-between;align-items:center;padding:21px 0 19px}
  .status-bar__time{font-family:system-ui,-apple-system,sans-serif;font-size:17px;font-weight:590;color:#fff;letter-spacing:-.3px;width:100px}
  .status-bar__icons{display:flex;align-items:center;gap:6px;justify-content:flex-end;width:100px}
  .status-bar__icons i{color:#fff;line-height:1}
  .icon-cellular{font-size:14px}.icon-wifi{font-size:14px}.icon-battery{font-size:18px}

  /* ── Top nav ── */
  .top-nav{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
  .btn-back{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s}
  .btn-back:hover{background:rgba(255,255,255,.12)}
  .btn-back:focus-visible{outline:2px solid rgba(255,255,255,.7);outline-offset:2px;}
  .btn-back i{font-size:18px;color:rgba(255,255,255,.7)}
  .step-label{font-size:12px;font-weight:500;color:rgba(255,255,255,.65)}
  .step-label span{color:var(--brand-sec-h);font-weight:600}

  /* ── Progress ── */
  .progress-segs{display:flex;gap:4px;margin-top:14px}
  .seg{flex:1;height:3px;border-radius:99px;background:rgba(255,255,255,.10)}
  .seg.done{background:var(--primary-600)}
  .seg.active{background:linear-gradient(to right,var(--primary-600) 60%,rgba(255,255,255,.10) 60%)}

  /* ── Heading ── */
  .page-header{margin-top:28px}
  .page-eyebrow{font-size:11px;font-weight:600;letter-spacing:.8px;color:var(--attention);text-transform:uppercase;margin-bottom:10px}
  .page-title{font-family:'DM Serif Display',serif;font-size:26px;line-height:33px;color:var(--text-primary)}
  .page-sub{margin-top:8px;font-size:13px;line-height:19px;color:rgba(255,255,255,.65)}

  /* ── Options ── */
  .options-list{display:flex;flex-direction:column;gap:10px;margin-top:28px}

  .option-row{
    display:flex;align-items:center;gap:14px;
    padding:15px 16px;border-radius:24px;
    background:#322f35;
    border:1px solid #413e44;
    cursor:pointer;user-select:none;
    transition:background .18s,border-color .18s,transform .1s;
  }
  .option-row:active{transform:scale(.985)}

  .option-row > i{
    font-size:22px;color:rgba(255,255,255,.55);
    transition:color .18s;flex-shrink:0;
  }

  .option-label{
    flex:1;font-size:15px;font-weight:500;
    color:rgba(255,255,255,.65);line-height:1.3;
    transition:color .18s;
  }
  .option-row:focus-visible{outline:2px solid rgba(255,255,255,.7);outline-offset:2px;}

  .option-radio{
    width:20px;height:20px;border-radius:50%;
    border:2px solid rgba(255,255,255,.12);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    transition:border-color .18s;
  }
  .option-radio::after{
    content:'';width:8px;height:8px;border-radius:50%;
    background:var(--primary-700);transform:scale(0);
    transition:transform .18s cubic-bezier(.34,1.56,.64,1);
  }

  /* Selected */
  .option-row.selected{background:rgba(194,76,0,.18);border-color:#c24c00}
  .option-row.selected > i{color:#c24c00}
  .option-row.selected .option-label{color:#c24c00;font-weight:600}
  .option-row.selected .option-radio{border-color:#c24c00}
  .option-row.selected .option-radio::after{transform:scale(1)}

  /* ── Footer ── */
  .footer{margin-top:auto;padding:20px 0 32px}
  .btn-finish{
    width:100%;height:52px;border-radius:40px;
    background:#c24c00;border:1px solid #943a00;cursor:pointer;
    font-family:'Plus Jakarta Sans',sans-serif;font-size:16px;font-weight:500;
    color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;
    transition:background .15s,border-color .15s,transform .1s;
  }
  .btn-finish i{font-size:18px}
  .btn-finish:hover{background:#c44e00;border-color:#b53700}
  .btn-finish:active{background:#943a00;border-color:#6b1800;transform:scale(.98)}
  .btn-finish:focus-visible{outline:2px solid rgba(255,255,255,.7);outline-offset:2px;}
  .btn-finish:disabled{background:rgba(255,255,255,.07);border-color:transparent;color:#9c9a9f;cursor:not-allowed;transform:none}
  /* ── Scroll area ── */
  .phone { overflow: hidden; }
  .scroll-area { flex:1; overflow-y:auto; scrollbar-width:none; padding-bottom:8px; }
  .scroll-area::-webkit-scrollbar { display:none; }
  .footer { position:sticky; bottom:0; background:var(--neutral-900); }

@media (max-width: 430px) {
  html, body { background: #0f0d12; }
  body { align-items: flex-start; }
  .phone {
    width: 100%;
    height: calc(100svh + env(safe-area-inset-top));
    border-radius: 0;
    box-shadow: none;
    padding-bottom: env(safe-area-inset-bottom);
    padding-top: env(safe-area-inset-top);
  }
  .status-bar { display: none; }
  /* fade above nav bar */
  .nav-wrap { position: relative; }
  .nav-wrap::before {
    content: '';
    position: absolute;
    top: -52px; left: 0; right: 0; height: 52px;
    background: linear-gradient(to bottom, transparent, #100d12);
    pointer-events: none;
    z-index: 4;
  }
}
@media (max-width: 430px){ .footer{ padding-bottom: 8px; } }
</style>
</head>
<body>
<div class="phone">

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-bar__time">9:41</span>
    <div class="status-bar__icons">
      <i class="ph-fill ph-cell-signal-full icon-cellular" aria-hidden="true"></i>
      <i class="ph-fill ph-wifi-high icon-wifi" aria-hidden="true"></i>
      <i class="ph-fill ph-battery-full icon-battery" aria-hidden="true"></i>
    </div>
  </div>

  <!-- Top nav -->
  <div class="top-nav">
    <button class="btn-back" onclick="history.back()" aria-label="Torna indietro"><i class="ph ph-arrow-left" aria-hidden="true"></i></button>
    <span class="step-label">Step <span>6</span> of 6</span>
  </div>

  <!-- Progress — all filled on last step -->
  <div class="progress-segs">
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg done"></div>
    <div class="seg active"></div>
  </div>

  <!-- Heading -->
  <div class="page-header">
    <p class="page-eyebrow">Ultimo step</p>
    <h1 class="page-title">Quanto spendi in una serata?</h1>
    <p class="page-sub">In media, tutto compreso — drink, ingresso, trasporti.</p>
  </div>

  <!-- Options -->
  <div class="options-list">

    <div class="option-row" role="button" tabindex="0" onclick="select(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
      <i class="ph ph-coins" aria-hidden="true"></i>
      <span class="option-label">Sotto 20€</span>
      <div class="option-radio"></div>
    </div>

    <div class="option-row" role="button" tabindex="0" onclick="select(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
      <i class="ph ph-money" aria-hidden="true"></i>
      <span class="option-label">20 – 40€</span>
      <div class="option-radio"></div>
    </div>

    <div class="option-row" role="button" tabindex="0" onclick="select(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
      <i class="ph ph-wallet" aria-hidden="true"></i>
      <span class="option-label">40 – 60€</span>
      <div class="option-radio"></div>
    </div>

    <div class="option-row" role="button" tabindex="0" onclick="select(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
      <i class="ph ph-credit-card" aria-hidden="true"></i>
      <span class="option-label">60 – 100€</span>
      <div class="option-radio"></div>
    </div>

    <div class="option-row" role="button" tabindex="0" onclick="select(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();this.click();}">
      <i class="ph ph-crown" aria-hidden="true"></i>
      <span class="option-label">Oltre 100€</span>
      <div class="option-radio"></div>
    </div>

  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-finish" id="btnFinish" disabled onclick="localStorage.setItem('last_home_page', 'home-profile-done.html'); window.location.href='events-browse.html'">
      Inizia a scoprire <i class="ph ph-confetti" aria-hidden="true"></i>
    </button>
  </div>

</div>

<script>
function select(row) {
  document.querySelectorAll('.option-row').forEach(r => r.classList.remove('selected'));
  row.classList.add('selected');
  document.getElementById('btnFinish').disabled = false;
}
</script>
</body>
</html>
